<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Success - ShopEase</title>
    <!-- Apply theme early to prevent flash -->
    <script>
        const savedTheme = localStorage.getItem('theme') || 'dark';
        document.documentElement.setAttribute('data-theme', savedTheme);
    </script>
    <!-- Import Premium Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Default Dark Theme variables */
            --primary-grad: linear-gradient(135deg, #a855f7 0%, #6366f1 50%, #06b6d4 100%);
            --primary: #06b6d4;
            --secondary: #6366f1;
            --bg-color: #060713;
            --card-bg: rgba(18, 20, 38, 0.7);
            --text-color: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: rgba(99, 102, 241, 0.15);
            --accent: #f43f5e;
            --success: #10b981;
            
            --bg-glow-1: rgba(168, 85, 247, 0.15);
            --bg-glow-2: rgba(6, 182, 212, 0.12);
            --card-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
            --card-hover-shadow: 0 20px 40px rgba(6, 182, 212, 0.12);
            --card-hover-border: rgba(6, 182, 212, 0.4);
            --nav-bg: rgba(8, 9, 20, 0.75);
            --input-bg: rgba(255, 255, 255, 0.05);
            --input-focus-bg: rgba(255, 255, 255, 0.1);
            --select-bg: #0d0e1b;
            --image-wrap-bg: #080914;
        }

        html[data-theme="light"] {
            /* Light Theme variables */
            --primary-grad: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            --primary: #6366f1;
            --secondary: #a855f7;
            --bg-color: #f8fafc;
            --card-bg: rgba(255, 255, 255, 0.85);
            --text-color: #0f172a;
            --text-muted: #64748b;
            --border-color: rgba(226, 232, 240, 0.8);
            --accent: #f43f5e;
            --success: #10b981;
            
            --bg-glow-1: rgba(99, 102, 241, 0.05);
            --bg-glow-2: rgba(168, 85, 247, 0.05);
            --card-shadow: 0 4px 20px rgba(0, 0, 0, 0.02);
            --card-hover-shadow: 0 20px 40px rgba(99, 102, 241, 0.08);
            --card-hover-border: rgba(99, 102, 241, 0.2);
            --nav-bg: rgba(255, 255, 255, 0.8);
            --input-bg: rgba(241, 245, 249, 0.6);
            --input-focus-bg: white;
            --select-bg: white;
            --image-wrap-bg: #f1f5f9;
        }

        body {
            font-family: 'Outfit', sans-serif;
            margin: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            background-image: 
                radial-gradient(at 0% 0%, var(--bg-glow-1) 0px, transparent 50%),
                radial-gradient(at 100% 100%, var(--bg-glow-2) 0px, transparent 50%);
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background-color 0.3s, color 0.3s;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 3.5rem;
            border-radius: 24px;
            border: 1px solid var(--border-color);
            box-shadow: var(--card-shadow);
            text-align: center;
            max-width: 500px;
            width: 90%;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: var(--card-hover-shadow);
            border-color: var(--card-hover-border);
        }

        .check-icon {
            font-size: 5rem;
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1.5rem;
            animation: scaleIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        @keyframes scaleIn {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        h1 {
            color: var(--text-color);
            font-size: 2rem;
            font-weight: 800;
            margin-top: 0;
            margin-bottom: 1rem;
            letter-spacing: -0.5px;
        }

        p {
            color: var(--text-muted);
            font-size: 1.05rem;
            line-height: 1.6;
            margin-bottom: 2.5rem;
        }

        .btn {
            display: inline-block;
            padding: 0.85rem 2.5rem;
            background: var(--primary-grad);
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 15px rgba(168, 85, 247, 0.2);
        }

        .btn:hover {
            transform: scale(1.02);
            box-shadow: 0 6px 20px rgba(6, 182, 212, 0.3);
        }

        .btn:active {
            transform: scale(0.98);
        }

        .theme-toggle-btn {
            position: absolute;
            top: 2rem;
            right: 2rem;
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.1rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            outline: none;
            z-index: 10;
        }

        .theme-toggle-btn:hover {
            transform: scale(1.08) rotate(15deg);
            background: var(--input-focus-bg);
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.2);
        }
    </style>
</head>
<body>

    <button id="themeToggle" class="theme-toggle-btn" onclick="toggleTheme()"></button>

    <div class="card">
        <div class="check-icon">✓</div>
        <h1>Order Placed Successfully!</h1>
        <p>Thank you for shopping with ShopEase. Your order is being processed and will be shipped soon.</p>
        <a href="shop.html" class="btn">Continue Shopping</a>
    </div>

    <script>
        // Theme toggling functions
        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme') || 'dark';
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateThemeButton(newTheme);
        }

        function updateThemeButton(theme) {
            const btn = document.getElementById('themeToggle');
            if (btn) {
                btn.innerHTML = theme === 'dark' ? '☀️' : '🌙';
            }
        }
        
        // Initial Theme Toggle button load
        updateThemeButton(savedTheme);
    </script>
</body>
</html>
